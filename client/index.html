<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO básico -->
    <title>Selva Import - Tu tienda de confianza</title>
    <meta name="description" content="Tienda online en San Ramón. Tecnología, moda, hogar y más. Envíos a La Merced y coordinación por WhatsApp." />
    <meta name="robots" content="index, follow" />

    <!-- PWA -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Selva Import" />
    <link rel="apple-touch-icon" href="/parrot_favicon_180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/parrot_favicon_192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/logo-selva-import.jpg" />

    <!-- Preload imagen banner -->
    <link
      rel="preload"
      as="image"
      href="/logo-selva-import.jpg"
      fetchpriority="high"
    />

    <!-- DNS prefetch Cloudinary -->
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <!-- Open Graph / SEO -->
    <meta property="og:title" content="Selva Import - Tu tienda de confianza" />
    <meta property="og:description" content="Tu tienda de confianza en San Ramón. Tecnología, moda, hogar y más." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo-selva-import.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="/" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
