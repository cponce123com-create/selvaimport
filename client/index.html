<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO básico -->
    <title>Selva Import - Tu tienda de confianza</title>
    <meta name="description" content="Tienda online en San Ramón. Tecnología, moda, hogar y más. Envíos a La Merced y coordinación por WhatsApp." />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/logo-selva-import.jpg" />

    <!--
      OPTIMIZACIÓN LCP:
      Precargar la imagen del banner principal para que el navegador
      la descargue antes de parsear el JS.
      IMPORTANTE: Cambia la URL por la imagen real de tu primer banner.
    -->
    <link
      rel="preload"
      as="image"
      href="/logo-selva-import.jpg"
      fetchpriority="high"
    />

    <!--
      DNS PREFETCH para Cloudinary:
      El navegador resuelve el dominio de Cloudinary antes de que
      las imágenes de productos sean solicitadas.
      IMPORTANTE: Reemplaza "tu-cloud-name" con tu CLOUDINARY_CLOUD_NAME real.
    -->
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <!--
      Google Identity Services se carga de forma diferida (defer).
      Antes estaba bloqueando el renderizado inicial.
      El atributo "defer" hace que cargue después del HTML, sin bloquear el LCP.
    -->
    <script
      src="https://accounts.google.com/gsi/client"
      defer
      async
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
